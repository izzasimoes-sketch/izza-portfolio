<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>OG Image — Izza Simões</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400;1,600&family=Special+Elite&family=Caveat:wght@700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #F5EFE4;
      font-family: 'Special Elite', 'Courier New', monospace;
      position: relative;
    }

    /* Horizontal paper lines */
    .lines {
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 31px,
        rgba(28,20,16,0.038) 31px,
        rgba(28,20,16,0.038) 32px
      );
      pointer-events: none;
    }

    /* Typewriter watermark */
    .typewriter-bg {
      position: absolute;
      right: -40px;
      bottom: -60px;
      width: 560px;
      height: 420px;
      background: url('assets/typewriter.png') center bottom / contain no-repeat;
      filter: grayscale(1) sepia(0.4);
      opacity: 0.07;
      mix-blend-mode: multiply;
    }

    /* Left ink bar */
    .ink-bar {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 8px;
      background: #1C1410;
    }

    /* Content area */
    .content {
      position: absolute;
      left: 72px;
      top: 56px;
      right: 348px;
      bottom: 72px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .top-block {}

    .chapter-marker {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
    }
    .ch-num {
      font-family: 'Special Elite', monospace;
      font-size: 11px;
      letter-spacing: 0.28em;
      color: #7A6A55;
      text-transform: uppercase;
    }
    .ch-line {
      width: 40px;
      height: 1px;
      background: #D9CDBA;
    }
    .ch-label {
      font-family: 'Special Elite', monospace;
      font-size: 11px;
      letter-spacing: 0.22em;
      color: #7A6A55;
      text-transform: uppercase;
    }

    .name {
      font-family: 'Caveat', cursive;
      font-size: 78px;
      font-weight: 700;
      color: #1C1410;
      line-height: 0.95;
      margin-bottom: 20px;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }

    .role {
      font-family: 'Special Elite', monospace;
      font-size: 14px;
      color: #7A6A55;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .divider {
      width: 64px;
      height: 1px;
      background: #D9CDBA;
      margin-bottom: 28px;
    }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 26px;
      color: #3A2E26;
      line-height: 1.4;
      letter-spacing: -0.01em;
      max-width: 460px;
    }

    .bottom-block {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .url {
      font-family: 'Special Elite', monospace;
      font-size: 13px;
      color: #7A6A55;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .stamp {
      width: 56px;
      height: 64px;
      border: 2px solid #8B1A1A;
      padding: 4px;
      background: #FDFAF5;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 4px;
    }
    .stamp-inner {
      border: 1px solid #8B1A1A;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 2px;
    }
    .stamp-is {
      font-family: 'Special Elite', monospace;
      font-size: 18px;
      color: #8B1A1A;
      font-weight: 700;
      letter-spacing: 0.06em;
    }
    .stamp-year {
      font-family: 'Special Elite', monospace;
      font-size: 10px;
      color: #8B1A1A;
      letter-spacing: 0.08em;
    }

    /* Right side — paper texture strip */
    .right-strip {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 320px;
      background: #EAE0CC;
      background-image: repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 31px,
        rgba(28,20,16,0.045) 31px,
        rgba(28,20,16,0.045) 32px
      );
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 48px 40px;
    }

    .skill-item {
      font-family: 'Special Elite', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #7A6A55;
      border: 1px solid #D9CDBA;
      padding: 10px 20px;
      width: 100%;
      text-align: center;
      border-radius: 2px;
    }

    .skill-item.accent {
      border-color: rgba(196,98,26,0.4);
      color: #C4621A;
    }

    .skill-heading {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 32px;
      color: #1C1410;
      letter-spacing: -0.01em;
      text-align: center;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .right-divider {
      width: 40px;
      height: 1px;
      background: #D9CDBA;
    }

    /* Tape strips decorative */
    .tape {
      position: absolute;
      background: rgba(255, 235, 150, 0.75);
      border: 1px solid rgba(200,180,80,0.3);
    }
    .tape-1 { top: 48px; right: 340px; width: 52px; height: 18px; transform: rotate(-3deg); }
    .tape-2 { bottom: 80px; right: 360px; width: 44px; height: 18px; transform: rotate(5deg); }
  </style>
</head>
<body>

  <div class="lines"></div>
  <div class="typewriter-bg"></div>
  <div class="ink-bar"></div>
  <div class="tape tape-1"></div>
  <div class="tape tape-2"></div>

  <div class="content">
    <div class="top-block">
      <div class="chapter-marker">
        <span class="ch-num">Portfolio</span>
        <div class="ch-line"></div>
        <span class="ch-label">2025</span>
      </div>

      <div class="name">Izza Simões</div>
      <div class="role">Design Engineer · Product Designer · AI</div>
      <div class="divider"></div>
      <p class="tagline">"From the sertão of Paraíba<br>to the whole damn planet."</p>
    </div>

    <div class="bottom-block">
      <span class="url">izzasimoes.com</span>
      <div class="stamp">
        <div class="stamp-inner">
          <span class="stamp-is">IS</span>
          <span class="stamp-year">2025</span>
        </div>
      </div>
    </div>
  </div>

  <div class="right-strip">
    <p class="skill-heading">Design<br><em>builds</em><br>worlds.</p>
    <div class="right-divider"></div>
    <div class="skill-item accent">0 → 1 Products</div>
    <div class="skill-item">Brand &amp; Systems</div>
    <div class="skill-item">AI-Powered Experiences</div>
    <div class="skill-item">Startups since 2017</div>
  </div>

</body>
</html>
